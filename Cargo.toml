[package]
name = "isabelle-rs"
version = "0.4.0"
edition = "2024"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "io-util", "io-std"] }
rowan = "0.15"
wasmtime = "29"
rusqlite = { version = "0.32", features = ["bundled"] }
clap = { version = "4", features = ["derive"] }
bincode = "1"
sha2 = "0.10"
proptest = "1"

[[bin]]
name = "isabelle-rs"
path = "src/main.rs"

[[bin]]
name = "isabelle-build"
path = "src/bin/isabelle-build.rs"
