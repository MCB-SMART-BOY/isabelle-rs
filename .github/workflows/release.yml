# Release workflow — triggered by pushing a git tag like 'v0.7.3'
# Builds release binaries for Linux, macOS, Windows and creates a GitHub Release.

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================================================
  # Build release binaries for all platforms
  # ==========================================================================

  build-linux:
    name: "release / linux"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: isabelle-rs-linux-x86_64
          path: |
            target/release/isabelle-rs
            target/release/isabelle-build

  build-macos:
    name: "release / macos"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: isabelle-rs-macos-x86_64
          path: |
            target/release/isabelle-rs
            target/release/isabelle-build

  build-windows:
    name: "release / windows"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: isabelle-rs-windows-x86_64
          path: |
            target/release/isabelle-rs.exe
            target/release/isabelle-build.exe

  # ==========================================================================
  # Create GitHub Release with all artifacts
  # ==========================================================================

  create-release:
    name: "create release"
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create archives
        run: |
          cd artifacts
          tar czf isabelle-rs-linux-x86_64.tar.gz isabelle-rs-linux-x86_64/
          tar czf isabelle-rs-macos-x86_64.tar.gz isabelle-rs-macos-x86_64/
          zip -r isabelle-rs-windows-x86_64.zip isabelle-rs-windows-x86_64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/isabelle-rs-linux-x86_64.tar.gz
            artifacts/isabelle-rs-macos-x86_64.tar.gz
            artifacts/isabelle-rs-windows-x86_64.zip
          body_path: CHANGELOG.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-pre') || contains(github.ref, '-rc') }}
