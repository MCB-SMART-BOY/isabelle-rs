# Isabelle-rs Skills Registry
# ============================
# Central manifest for all Claude Code skills.
# Each skill entry defines its identity, triggers, dependencies,
# permissions, and lifecycle status.

[registry]
version = "2.0.0"
project = "isabelle-rs"
updated = "2026-06-03"

# =============================================================================
# Skill Categories
# =============================================================================
#
# verification  — lemma verification, test running, failure diagnosis
# debugging     — stack overflow, performance, build errors
# safety        — kernel audits, type safety, LCF invariants
# development   — adding methods, commands, porting from ML
# theory        — theory building, DB search, parse debugging
# release       — version bumps, changelog, doc sync
# meta          — benchmarks, test matrices

# =============================================================================
# Skill Definitions
# =============================================================================

[[skills]]
id = "verify"
name = "Verify Lemma"
description = "Verify lemma(s) through the six-layer fallback architecture. Run tests, diagnose failures, debug proof search."
category = "verification"
status = "active"
version = "2.0.0"
triggers = ["lemma verification", "proof failure", "test failure", "this lemma doesn't prove", "verify fails"]
permissions = ["Bash:cargo test", "Bash:cargo run", "Read", "Grep"]
depends_on = [".claude/rules/testing.md", ".claude/rules/proof-methods.md", ".claude/rules/kernel.md"]
related_skills = ["debug-overflow", "audit-kernel"]
lifecycle = { created = "2026-06-03", last_reviewed = "2026-06-03", review_interval_days = 30 }

[[skills]]
id = "debug-overflow"
name = "Debug Stack Overflow"
description = "Diagnose stack overflow errors and select the right iterative conversion pattern (stack, worklist, continuation frames, iterative deepening)."
category = "debugging"
status = "active"
version = "2.0.0"
triggers = ["stack overflow", "overflowed its stack", "SIGABRT", "recursion too deep", "stack overflow at"]
permissions = ["Bash:cargo test", "Bash:RUST_MIN_STACK", "Read"]
depends_on = [".claude/rules/iterative.md"]
related_skills = ["verify", "bench"]
lifecycle = { created = "2026-06-03", last_reviewed = "2026-06-03", review_interval_days = 60 }

[[skills]]
