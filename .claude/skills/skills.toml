# =============================================================================
# Skill Lifecycle States
# =============================================================================
#
# active       — in regular use, maintained
# experimental — new, not yet fully validated
# deprecated   — superseded, will be removed
# retired      — removed, kept for reference

# =============================================================================
# Permission Categories
# =============================================================================
#
# Bash:cargo test    — run test suites
# Bash:cargo check   — compile checks
# Bash:cargo clippy  — lint checks
# Bash:cargo fmt     — format checks
# Bash:cargo run     — run CLI binaries
# Bash:rg            — ripgrep searches
# Bash:git           — git operations
# Bash:RUST_MIN_STACK — needs stack env var
# Read               — read source files
# Edit               — modify source files
# Grep               — content search
# Write              — create new files
